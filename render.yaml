services:
  - type: web
    name: docforyou-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_BASE_URL
        sync: false
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        sync: false
      - key: MONGO_URI
        sync: false
